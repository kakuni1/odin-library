<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double:wght@100..900&family=WDXL+Lubrifont+JP+N&display=swap"
      rel="stylesheet"
    />
    <script src="library.js" defer></script>
  </head>
  <body>
    <div class="container">
      <svg
        id="add-book-icon"
        xmlns="http://www.w3.org/2000/svg"
        height="32px"
        viewBox="0 -960 960 960"
        width="32px"
      >
        <path
          d="M280-160v-441q0-33 24-56t57-23h439q33 0 56.5 23.5T880-600v320L680-80H360q-33 0-56.5-23.5T280-160ZM81-710q-6-33 13-59.5t52-32.5l434-77q33-6 59.5 13t32.5 52l10 54h-82l-7-40-433 77 40 226v279q-16-9-27.5-24T158-276L81-710Zm279 110v440h280l160-160v-280H360Zm220 220Zm-40 160h80v-120h120v-80H620v-120h-80v120H420v80h120v120Z"
        />
      </svg>
      <div class="shelf"></div>
      <dialog id="open-window" closedby="any">
        <h3>Add a new book to collection</h3>
        <br />
        <p>Title:</p>
        <input type="text" id="book-title" />
        <p>Author:</p>
        <input type="text" id="author-first-name" placeholder="First Name" />
        <input type="text" id="author-last-name" placeholder="Last Name" />
        <button id="close-window">cancel</button>
        <input type="submit" id="submit" onclick="addBookToLibrary()" />
      </dialog>
    </div>
  </body>
</html>
